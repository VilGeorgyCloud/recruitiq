<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roles — RecruitIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f9fc; --surface: #ffffff; --border: #e5e7ef; --border2: #d0d3e0;
    --accent: #4f6ef7; --green: #18a066; --red: #d94f4f; --gold: #d4920a;
    --text: #1a1d2e; --muted: #7b8099;
    --body: 'Poppins', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }

  nav { position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--body); font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; }
  .nav-back { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border2); padding: 4px 10px; border-radius: 4px; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
  .nav-back:hover { color: var(--accent); border-color: var(--accent); }

  .wrapper { max-width: 1100px; margin: 0 auto; padding: 0 32px; }
  .page-header { padding: 20px 0 16px; }
  .page-label { font-family: var(--mono); font-size: 10px; color: var(--red); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .page-title { font-size: 18px; font-weight: 600; }

  .add-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
  .form-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
  .field select option { background: #fff; }
  .form-actions { display: flex; justify-content: flex-end; margin-top: 4px; }

  .btn { font-family: var(--mono); font-size: 11px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border2); cursor: pointer; transition: all 0.15s; background: var(--surface); color: var(--muted); }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--red); color: #fff; border-color: var(--red); font-weight: 500; padding: 8px 18px; font-size: 12px; }
  .btn-primary:hover { filter: brightness(1.1); color: #fff; border-color: var(--red); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-sm { padding: 5px 10px; font-size: 10px; }

  .table-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .table-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .table-head h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .count-badge { font-family: var(--mono); font-size: 10px; background: var(--bg); border: 1px solid var(--border2); color: var(--muted); padding: 2px 8px; border-radius: 10px; }
  .search-bar { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .search-bar input, .search-bar select { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 7px 12px; outline: none; transition: border-color 0.2s; }
  .search-bar input { flex: 1; }
  .search-bar input:focus, .search-bar select:focus { border-color: var(--accent); background: #fff; }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar select option { background: #fff; }

  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 10px 14px; text-align: left; background: #fafbfd; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fff5f5; }
  tbody td { padding: 11px 14px; font-size: 12px; vertical-align: middle; }
  .td-mono { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .td-link { color: var(--accent); font-family: var(--mono); font-size: 11px; text-decoration: none; }
  .td-link:hover { text-decoration: underline; }
  .actions { display: flex; gap: 4px; }
  .empty-state { padding: 48px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 12px; }

  .mandate-pill { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid; display: inline-block; }
  .pill-active  { color: var(--green); border-color: #b6e8d4; background: #edf9f4; }
  .pill-hold    { color: var(--gold);  border-color: #f5d68a; background: #fdf8ec; }
  .pill-closed  { color: var(--muted); border-color: var(--border2); background: var(--bg); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 600px; margin: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; border-radius: 8px; padding: 10px 18px; font-family: var(--mono); font-size: 12px; z-index: 999; transform: translateY(60px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  footer { margin-top: 60px; border-top: 1px solid var(--border); padding: 16px 0; }
  .footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; }
  .footer-inner p { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  @media(max-width:768px) { .form-grid,.form-grid-2{grid-template-columns:1fr} .wrapper{padding:0 16px} }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>RecruitIQ</a>
    <a href="index.html" class="nav-back">← Home</a>
  </div>
</nav>
<div class="wrapper">
  <div class="page-header">
    <div class="page-label">Management</div>
    <h1 class="page-title">Roles</h1>
  </div>
  <div class="add-panel">
    <div class="panel-title">Add Role</div>
    <div class="form-grid">
      <div class="field"><label>Hiring Company *</label><select id="i-company"><option value="">— Select —</option></select></div>
      <div class="field"><label>Role Name *</label><input type="text" id="i-name" placeholder="e.g. Software Engineer" /></div>
      <div class="field"><label>No. of Positions</label><input type="number" id="i-positions" value="1" min="1" /></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Experience Required</label><input type="text" id="i-exp" placeholder="e.g. 3-5 years" /></div>
      <div class="field"><label>Location</label><input type="text" id="i-location" placeholder="e.g. Bangalore" /></div>
      <div class="field"><label>JD Link</label><input type="url" id="i-jd" placeholder="https://..." /></div>
    </div>
    <div class="form-grid-2">
      <div class="field"><label>Mandate Status</label>
        <select id="i-status"><option value="ACTIVE">Active</option><option value="ON_HOLD">On Hold</option><option value="CLOSED">Closed</option></select>
      </div>
    </div>
    <div class="form-actions"><button class="btn btn-primary" onclick="addRole()">+ Add Role</button></div>
  </div>

  <div class="table-panel">
    <div class="table-head"><h3>All Roles</h3><span class="count-badge" id="count">0 roles</span></div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search roles, companies..." oninput="filterRoles()" />
      <select id="filter-status" onchange="filterRoles()">
        <option value="">All Statuses</option>
        <option value="ACTIVE">Active</option>
        <option value="ON_HOLD">On Hold</option>
        <option value="CLOSED">Closed</option>
      </select>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>Role Name</th><th>Company</th><th>Positions</th><th>Experience</th><th>Location</th><th>JD</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="8"><div class="empty-state">Loading...</div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Role</h3>
    <div class="form-grid">
      <div class="field"><label>Role Name *</label><input type="text" id="e-name" /></div>
      <div class="field"><label>No. of Positions</label><input type="number" id="e-positions" min="1" /></div>
      <div class="field"><label>Experience Required</label><input type="text" id="e-exp" /></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Location</label><input type="text" id="e-location" /></div>
      <div class="field"><label>JD Link</label><input type="url" id="e-jd" /></div>
      <div class="field"><label>Mandate Status</label>
        <select id="e-status"><option value="ACTIVE">Active</option><option value="ON_HOLD">On Hold</option><option value="CLOSED">Closed</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<footer><div class="footer-inner"><p>RecruitIQ · 10xDeveloper.tech</p><p>role table</p></div></footer>

<script>
  const API='/api'; let roles=[],companies=[]; let editingId=null;
  async function load() {
    try {
      const [rRes,cRes]=await Promise.all([fetch(`${API}/roles`),fetch(`${API}/companies`)]);
      roles=await rRes.json(); companies=await cRes.json();
      const opts=companies.map(c=>`<option value="${c.hiringcompanyid}">${c.name}</option>`).join('');
      document.getElementById('i-company').innerHTML='<option value="">— Select Company —</option>'+opts;
      render(roles);
    } catch(e){showToast('Failed to load','error');}
  }
  function pill(s){if(s==='ACTIVE')return`<span class="mandate-pill pill-active">Active</span>`;if(s==='ON_HOLD')return`<span class="mandate-pill pill-hold">On Hold</span>`;return`<span class="mandate-pill pill-closed">Closed</span>`;}
  function render(data){
    const tbody=document.getElementById('table-body');
    document.getElementById('count').textContent=`${data.length} role${data.length===1?'':'s'}`;
    if(!data.length){tbody.innerHTML=`<tr><td colspan="8"><div class="empty-state">No roles yet.</div></td></tr>`;return;}
    tbody.innerHTML=data.map(r=>`<tr>
      <td><strong>${r.name}</strong></td><td>${r.companyname||'—'}</td>
      <td class="td-mono">${r.numpositions||1}</td>
      <td style="color:var(--muted)">${r.experiencerequired||'—'}</td>
      <td style="color:var(--muted)">${r.location||'—'}</td>
      <td>${r.jdlink?`<a class="td-link" href="${r.jdlink.startsWith('http')?r.jdlink:'https://'+r.jdlink}" target="_blank" rel="noopener">View ↗</a>`:'—'}</td>
      <td>${pill(r.mandatestatus)}</td>
      <td><div class="actions">
        <button class="btn btn-sm" onclick="openEdit(${r.roleid})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteRole(${r.roleid})">Del</button>
      </div></td></tr>`).join('');
  }
  function filterRoles(){const q=document.getElementById('search').value.toLowerCase();const fs=document.getElementById('filter-status').value;render(roles.filter(r=>(!q||r.name.toLowerCase().includes(q)||(r.companyname||'').toLowerCase().includes(q))&&(!fs||r.mandatestatus===fs)));}
  async function addRole(){
    const companyId=document.getElementById('i-company').value;const name=document.getElementById('i-name').value.trim();
    if(!companyId)return showToast('Please select a company','error');if(!name)return showToast('Role name required','error');
    const body={hiringCompanyId:parseInt(companyId),name,numPositions:parseInt(document.getElementById('i-positions').value)||1,
      experienceRequired:document.getElementById('i-exp').value.trim()||null,location:document.getElementById('i-location').value.trim()||null,
      jdLink:document.getElementById('i-jd').value.trim()||null,mandateStatus:document.getElementById('i-status').value};
    try{const res=await fetch(`${API}/roles`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){const e=await res.json();throw new Error(e.error);}
    ['i-name','i-exp','i-location','i-jd'].forEach(id=>document.getElementById(id).value='');document.getElementById('i-positions').value='1';document.getElementById('i-company').value='';
    showToast('Role added!','success');load();}catch(e){showToast(e.message,'error');}
  }
  function openEdit(id){const r=roles.find(x=>x.roleid===id);if(!r)return;editingId=id;
    document.getElementById('e-name').value=r.name||'';document.getElementById('e-positions').value=r.numpositions||1;
    document.getElementById('e-exp').value=r.experiencerequired||'';document.getElementById('e-location').value=r.location||'';
    document.getElementById('e-jd').value=r.jdlink||'';document.getElementById('e-status').value=r.mandatestatus||'ACTIVE';
    document.getElementById('edit-modal').classList.add('open');}
  function closeModal(){document.getElementById('edit-modal').classList.remove('open');editingId=null;}
  async function saveEdit(){
    const body={name:document.getElementById('e-name').value.trim(),numPositions:parseInt(document.getElementById('e-positions').value)||1,
      experienceRequired:document.getElementById('e-exp').value.trim()||null,location:document.getElementById('e-location').value.trim()||null,
      jdLink:document.getElementById('e-jd').value.trim()||null,mandateStatus:document.getElementById('e-status').value};
    try{await fetch(`${API}/roles/${editingId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    closeModal();showToast('Role updated!','success');load();}catch(e){showToast(e.message,'error');}
  }
  async function deleteRole(id){if(!confirm('Delete this role?'))return;try{await fetch(`${API}/roles/${id}`,{method:'DELETE'});showToast('Deleted','success');load();}catch(e){showToast(e.message,'error');}}
  function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
  load();
</script>
</body>
</html>
