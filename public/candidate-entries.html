<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Entries — RecruitIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f9fc; --surface: #ffffff; --border: #e5e7ef; --border2: #d0d3e0;
    --accent: #4f6ef7; --green: #18a066; --red: #d94f4f; --gold: #d4920a;
    --text: #1a1d2e; --muted: #7b8099;
    --body: 'Poppins', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }

  nav { position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); }
  .nav-inner { max-width: 98vw; margin: 0 auto; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--body); font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .nav-back { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border2); padding: 4px 10px; border-radius: 4px; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
  .nav-back:hover { color: var(--accent); border-color: var(--accent); }

  .wrapper { max-width: 98vw; margin: 0 auto; padding: 0 24px; }

  .page-header { padding: 20px 0 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 18px; font-weight: 600; }
  .page-label { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }

  .tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; width: fit-content; background: var(--surface); }
  .tab { font-family: var(--mono); font-size: 11px; padding: 8px 20px; cursor: pointer; color: var(--muted); background: transparent; border: none; border-right: 1px solid var(--border); transition: all 0.2s; }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: #f0f3ff; color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* GROUPED VIEW */
  .filters-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filters-bar input, .filters-bar select {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 7px 12px; outline: none; transition: border-color 0.2s;
  }
  .filters-bar input { flex: 1; min-width: 200px; }
  .filters-bar input:focus, .filters-bar select:focus { border-color: var(--accent); }
  .filters-bar input::placeholder { color: var(--muted); }

  .company-group { margin-bottom: 24px; }
  .company-header {
    font-size: 13px; font-weight: 600; color: var(--text);
    padding: 10px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px 8px 0 0;
    display: flex; align-items: center; gap: 8px;
    border-bottom: none;
  }
  .company-header .co-badge { font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 10px; }

  .role-group { border: 1px solid var(--border); border-top: none; }
  .role-group:last-child { border-radius: 0 0 8px 8px; }
  .role-header {
    font-size: 12px; font-weight: 500; color: var(--accent);
    padding: 8px 16px; background: #f5f7ff;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono);
  }
  .role-count { font-size: 10px; color: var(--muted); margin-left: auto; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted); padding: 8px 14px;
    text-align: left; background: #fafbfd; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f5f7ff; }
  tbody td { padding: 10px 14px; font-size: 12px; vertical-align: middle; }
  .td-mono { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .td-link { color: var(--accent); font-family: var(--mono); font-size: 11px; text-decoration: none; }
  .td-link:hover { text-decoration: underline; }

  .status-pill {
    font-family: var(--mono); font-size: 10px; padding: 2px 8px;
    border-radius: 10px; border: 1px solid var(--border2);
    background: #f0f3ff; color: var(--accent);
    white-space: nowrap; display: inline-block;
  }
  .actions { display: flex; gap: 4px; }
  .btn { font-family: var(--mono); font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); cursor: pointer; transition: all 0.15s; background: var(--surface); color: var(--muted); }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; padding: 8px 18px; font-size: 12px; }
  .btn-primary:hover { filter: brightness(1.1); color: #fff; }
  .btn-secondary { color: var(--muted); }

  .empty-state { padding: 48px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 12px; }

  /* ADD FORM */
  .add-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-title:first-child { margin-top: 0; }
  .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
  .form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
  .form-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea {
    background: var(--bg); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: var(--body); font-size: 13px;
    padding: 8px 12px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
  .field select option { background: #fff; }
  .field textarea { resize: vertical; min-height: 72px; }
  .form-actions { display: flex; justify-content: flex-end; margin-top: 18px; gap: 8px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 24px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 800px; margin: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; border-radius: 8px; padding: 10px 18px; font-family: var(--mono); font-size: 12px; z-index: 999; transform: translateY(60px); opacity: 0; transition: all 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  footer { margin-top: 60px; border-top: 1px solid var(--border); padding: 16px 0; }
  .footer-inner { max-width: 98vw; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
  .footer-inner p { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  @media(max-width:768px) { .form-grid,.form-grid-3,.form-grid-2{grid-column:1fr} .wrapper{padding:0 16px} }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>RecruitIQ</a>
    <a href="index.html" class="nav-back">← Home</a>
  </div>
</nav>

<div class="wrapper">
  <div class="page-header">
    <div>
      <div class="page-label">Submissions</div>
      <h1 class="page-title">Candidate Entries</h1>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('view', this)">📋 View All</button>
    <button class="tab" onclick="switchTab('add', this)">➕ Add Entry</button>
  </div>

  <!-- VIEW PANEL -->
  <div class="panel active" id="panel-view">
    <div class="filters-bar">
      <input type="text" id="search" placeholder="Search candidate, company, role..." oninput="renderGrouped()" />
      <select id="filter-status" onchange="renderGrouped()"><option value="">All Statuses</option></select>
      <select id="filter-company" onchange="renderGrouped()"><option value="">All Companies</option></select>
    </div>
    <div id="grouped-view"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- ADD PANEL -->
  <div class="panel" id="panel-add">
    <div class="add-panel">
      <div class="section-title">Candidate & Role</div>
      <div class="form-grid">
        <div class="field"><label>Candidate *</label><select id="a-candidate"><option value="">— Select —</option></select></div>
        <div class="field"><label>Company *</label><select id="a-company" onchange="loadRoles()"><option value="">— Select —</option></select></div>
        <div class="field"><label>Role *</label><select id="a-role"><option value="">— Select Company First —</option></select></div>
        <div class="field"><label>Status *</label><select id="a-status"><option value="">— Select —</option></select></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Recruiter</label><select id="a-recruiter"><option value="">— None —</option></select></div>
        <div class="field"><label>Total Exp (yrs)</label><input type="number" step="0.5" id="a-exp" placeholder="5.5" /></div>
        <div class="field"><label>CTC</label><input type="text" id="a-ctc" placeholder="12 LPA" /></div>
        <div class="field"><label>ECTC</label><input type="text" id="a-ectc" placeholder="18 LPA" /></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>NP (days)</label><input type="number" id="a-np" placeholder="30" /></div>
        <div class="field"><label>CV Link</label><input type="url" id="a-cvlink" placeholder="https://..." /></div>
        <div class="field"><label>CV Date</label><input type="date" id="a-cvdate" /></div>
        <div class="field"><label>Score</label><input type="number" id="a-score" placeholder="8" /></div>
      </div>
      <div class="section-title">Interview Rounds</div>
      <div class="form-grid-3">
        <div class="field"><label>R1 DateTime</label><input type="datetime-local" id="a-r1date" /></div>
        <div class="field"><label>R1 Feedback</label><input type="text" id="a-r1fb" placeholder="Cleared / Rejected..." /></div>
        <div class="field"></div>
        <div class="field"><label>R2 DateTime</label><input type="datetime-local" id="a-r2date" /></div>
        <div class="field"><label>R2 Feedback</label><input type="text" id="a-r2fb" /></div>
        <div class="field"></div>
        <div class="field"><label>R3 DateTime</label><input type="datetime-local" id="a-r3date" /></div>
        <div class="field"><label>R3 Feedback</label><input type="text" id="a-r3fb" /></div>
        <div class="field"></div>
        <div class="field"><label>Final Interview</label><input type="datetime-local" id="a-final" /></div>
        <div class="field"><label>Final Feedback</label><input type="text" id="a-finalfb" /></div>
        <div class="field"></div>
      </div>
      <div class="section-title">Notes</div>
      <div class="field"><label>Recruiter Notes</label><textarea id="a-notes" placeholder="Any notes..."></textarea></div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
        <button class="btn btn-primary" onclick="addEntry()">+ Add Entry</button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Entry</h3>
    <div class="form-grid">
      <div class="field"><label>Status</label><select id="e-status"></select></div>
      <div class="field"><label>Recruiter</label><select id="e-recruiter"></select></div>
      <div class="field"><label>Total Exp</label><input type="number" step="0.5" id="e-exp" /></div>
      <div class="field"><label>CTC</label><input type="text" id="e-ctc" /></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>ECTC</label><input type="text" id="e-ectc" /></div>
      <div class="field"><label>NP (days)</label><input type="number" id="e-np" /></div>
      <div class="field"><label>CV Link</label><input type="url" id="e-cvlink" /></div>
      <div class="field"><label>CV Date</label><input type="date" id="e-cvdate" /></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Score</label><input type="number" id="e-score" /></div>
      <div class="field"><label>R1 DateTime</label><input type="datetime-local" id="e-r1date" /></div>
      <div class="field"><label>R1 Feedback</label><input type="text" id="e-r1fb" /></div>
      <div class="field"><label>R2 DateTime</label><input type="datetime-local" id="e-r2date" /></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>R2 Feedback</label><input type="text" id="e-r2fb" /></div>
      <div class="field"><label>R3 DateTime</label><input type="datetime-local" id="e-r3date" /></div>
      <div class="field"><label>R3 Feedback</label><input type="text" id="e-r3fb" /></div>
      <div class="field"><label>Final Interview</label><input type="datetime-local" id="e-final" /></div>
    </div>
    <div class="form-grid-2">
      <div class="field"><label>Final Feedback</label><input type="text" id="e-finalfb" /></div>
      <div class="field"><label>Recruiter Notes</label><input type="text" id="e-notes" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <div class="footer-inner">
    <p>RecruitIQ · 10xDeveloper.tech</p>
    <p>candidateentry table</p>
  </div>
</footer>

<script>
  const API = '/api';
  let entries = [], candidates = [], companies = [], allRoles = [], statuses = [], recruiters = [];
  let editingId = null;

  // ── STATUS SORT ORDER ──
  const STATUS_ORDER = [
    'Joined','Offer Accepted','Offer Extended','Offer Pending',
    'R3 Cleared','R3 - Scheduled','R2 Cleared','R2 - Scheduled',
    'R1 Cleared','R1 - Scheduled','Shortlisted','Action Required',
    'Assignment','On Hold','R1 Feedback Pending','R2 Feedback Pending',
    'Not Shortlisted','Screen Reject','R1 - Rejected','R2 - Rejected',
    'R3 - Rejected','Duplicate','Withdrew'
  ];

  function statusSort(a, b) {
    const ai = STATUS_ORDER.indexOf(a.statusname);
    const bi = STATUS_ORDER.indexOf(b.statusname);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  }

  // ── TABS ──
  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  // ── LOAD ──
  async function load() {
    try {
      const [eRes, cRes, coRes, rRes, sRes, recRes] = await Promise.all([
        fetch(`${API}/entries`), fetch(`${API}/candidates`), fetch(`${API}/companies`),
        fetch(`${API}/roles`), fetch(`${API}/statuses`), fetch(`${API}/recruiters`),
      ]);
      entries    = await eRes.json();
      candidates = await cRes.json();
      companies  = await coRes.json();
      allRoles   = await rRes.json();
      statuses   = await sRes.json();
      recruiters = await recRes.json();
      populateDropdowns();
      populateFilters();
      renderGrouped();
      checkURLParam();
    } catch(e) { showToast('Failed to load', 'error'); }
  }

  function checkURLParam() {
    const params = new URLSearchParams(window.location.search);
    const co = params.get('company');
    if (co) {
      const sel = document.getElementById('filter-company');
      const decoded = decodeURIComponent(co);
      for (let opt of sel.options) {
        if (opt.value === decoded) { sel.value = decoded; break; }
      }
      renderGrouped();
    }
  }

  function populateDropdowns() {
    const cOpts = candidates.map(c => `<option value="${c.candidateid}">${c.name}</option>`).join('');
    document.getElementById('a-candidate').innerHTML = '<option value="">— Select Candidate —</option>' + cOpts;
    const coOpts = companies.map(c => `<option value="${c.hiringcompanyid}">${c.name}</option>`).join('');
    document.getElementById('a-company').innerHTML = '<option value="">— Select Company —</option>' + coOpts;
    const sOpts = statuses.map(s => `<option value="${s.statusid}">${s.name}</option>`).join('');
    document.getElementById('a-status').innerHTML = '<option value="">— Select Status —</option>' + sOpts;
    document.getElementById('e-status').innerHTML = '<option value="">— Select Status —</option>' + sOpts;
    const rOpts = recruiters.map(r => `<option value="${r.recruiterid}">${r.name}</option>`).join('');
    const rAll = '<option value="">— None —</option>' + rOpts;
    document.getElementById('a-recruiter').innerHTML = rAll;
    document.getElementById('e-recruiter').innerHTML = rAll;
  }

  function loadRoles() {
    const companyId = parseInt(document.getElementById('a-company').value);
    const filtered = allRoles.filter(r => r.hiringcompanyid === companyId);
    const opts = filtered.map(r => `<option value="${r.roleid}">${r.name}</option>`).join('');
    document.getElementById('a-role').innerHTML = opts.length
      ? '<option value="">— Select Role —</option>' + opts
      : '<option value="">No roles for this company</option>';
  }

  function populateFilters() {
    const sOpts = statuses.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
    document.getElementById('filter-status').innerHTML = '<option value="">All Statuses</option>' + sOpts;
    const coOpts = companies.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    document.getElementById('filter-company').innerHTML = '<option value="">All Companies</option>' + coOpts;
  }

  // ── GROUPED RENDER ──
  function renderGrouped() {
    const q  = document.getElementById('search').value.toLowerCase();
    const fs = document.getElementById('filter-status').value;
    const fc = document.getElementById('filter-company').value;

    let filtered = entries.filter(e =>
      (!q  || (e.candidatename||'').toLowerCase().includes(q) || (e.rolename||'').toLowerCase().includes(q) || (e.companyname||'').toLowerCase().includes(q)) &&
      (!fs || e.statusname === fs) &&
      (!fc || e.companyname === fc)
    );

    if (!filtered.length) {
      document.getElementById('grouped-view').innerHTML = '<div class="empty-state">No entries found.</div>';
      return;
    }

    // group by company then role
    const byCompany = {};
    filtered.forEach(e => {
      const co = e.companyname || 'Unknown';
      const ro = e.rolename || 'Unknown';
      if (!byCompany[co]) byCompany[co] = {};
      if (!byCompany[co][ro]) byCompany[co][ro] = [];
      byCompany[co][ro].push(e);
    });

    const companyNames = Object.keys(byCompany).sort();
    let html = '';

    companyNames.forEach(co => {
      const roles = byCompany[co];
      const roleNames = Object.keys(roles).sort();
      const totalCo = roleNames.reduce((s, r) => s + roles[r].length, 0);

      html += `<div class="company-group">
        <div class="company-header">🏢 ${co} <span class="co-badge">${totalCo} entr${totalCo===1?'y':'ies'}</span></div>`;

      roleNames.forEach(ro => {
        const roleEntries = roles[ro].sort(statusSort);
        html += `<div class="role-group">
          <div class="role-header">🎯 ${ro} <span class="role-count">${roleEntries.length} candidate${roleEntries.length===1?'':'s'}</span></div>
          <table>
            <thead><tr>
              <th>Candidate</th><th>Status</th><th>Recruiter</th>
              <th>Exp</th><th>CTC</th><th>ECTC</th><th>NP</th>
              <th>CV Date</th><th>CV</th>
              <th>R1</th><th>R1 FB</th><th>R2</th><th>R2 FB</th>
              <th>R3</th><th>R3 FB</th><th>Final</th><th>Final FB</th>
              <th>Score</th><th>Notes</th><th>Actions</th>
            </tr></thead>
            <tbody>`;

        roleEntries.forEach(e => {
          html += `<tr>
            <td><strong>${e.candidatename||'—'}</strong></td>
            <td><span class="status-pill">${e.statusname||'—'}</span></td>
            <td class="td-mono">${e.recruitername||'—'}</td>
            <td class="td-mono">${e.totalexperience!=null?e.totalexperience+'y':'—'}</td>
            <td class="td-mono">${e.ctc||'—'}</td>
            <td class="td-mono">${e.ectc||'—'}</td>
            <td class="td-mono">${e.nodays!=null?e.nodays+'d':'—'}</td>
            <td class="td-mono">${e.cvdate?new Date(e.cvdate).toLocaleDateString():'—'}</td>
            <td>${e.cvlink?`<a class="td-link" href="${e.cvlink.startsWith('http')?e.cvlink:'https://'+e.cvlink}" target="_blank" rel="noopener">View ↗</a>`:'—'}</td>
            <td class="td-mono">${e.r1datetime?new Date(e.r1datetime).toLocaleDateString():'—'}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.r1feedback||''}">${e.r1feedback||'—'}</td>
            <td class="td-mono">${e.r2datetime?new Date(e.r2datetime).toLocaleDateString():'—'}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.r2feedback||''}">${e.r2feedback||'—'}</td>
            <td class="td-mono">${e.r3datetime?new Date(e.r3datetime).toLocaleDateString():'—'}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.r3feedback||''}">${e.r3feedback||'—'}</td>
            <td class="td-mono">${e.finalinterview?new Date(e.finalinterview).toLocaleDateString():'—'}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.finalfeedback||''}">${e.finalfeedback||'—'}</td>
            <td class="td-mono">${e.totalscore!=null?e.totalscore:'—'}</td>
            <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)" title="${e.recruiternotes||''}">${e.recruiternotes||'—'}</td>
            <td><div class="actions">
              <button class="btn" onclick="openEdit(${e.candidateentryid})">Edit</button>
              <button class="btn btn-danger" onclick="deleteEntry(${e.candidateentryid})">Del</button>
            </div></td>
          </tr>`;
        });

        html += `</tbody></table></div>`;
      });

      html += `</div>`;
    });

    document.getElementById('grouped-view').innerHTML = html;
  }

  // ── ADD ──
  function g(id)  { return document.getElementById(id).value.trim() || null; }
  function gi(id) { const v = document.getElementById(id).value; return v ? parseInt(v) : null; }
  function gf(id) { const v = document.getElementById(id).value; return v ? parseFloat(v) : null; }

  async function addEntry() {
    const candidateId = gi('a-candidate'), roleId = gi('a-role'), statusId = gi('a-status');
    if (!candidateId) return showToast('Please select a candidate', 'error');
    if (!roleId)      return showToast('Please select a role', 'error');
    if (!statusId)    return showToast('Please select a status', 'error');
    const body = {
      candidateId, roleId, statusId, recruiterId: gi('a-recruiter'),
      totalExperience: gf('a-exp'), ctc: g('a-ctc'), ectc: g('a-ectc'), noDays: gi('a-np'),
      cvLink: g('a-cvlink'), cvDate: g('a-cvdate'), totalScore: gi('a-score'), recruiterNotes: g('a-notes'),
      r1Datetime: g('a-r1date'), r1Feedback: g('a-r1fb'), r2Datetime: g('a-r2date'), r2Feedback: g('a-r2fb'),
      r3Datetime: g('a-r3date'), r3Feedback: g('a-r3fb'), finalInterview: g('a-final'), finalFeedback: g('a-finalfb'),
    };
    try {
      const res = await fetch(`${API}/entries`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
      showToast('Entry added!', 'success');
      clearForm();
      document.querySelectorAll('.tab')[0].click();
      load();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function clearForm() {
    ['a-candidate','a-company','a-role','a-status','a-recruiter','a-exp','a-ctc','a-ectc',
     'a-np','a-cvlink','a-cvdate','a-score','a-notes',
     'a-r1date','a-r1fb','a-r2date','a-r2fb','a-r3date','a-r3fb','a-final','a-finalfb']
      .forEach(id => document.getElementById(id).value = '');
  }

  // ── EDIT ──
  function toDTL(v) { return v ? new Date(v).toISOString().slice(0,16) : ''; }
  function toDL(v)  { return v ? new Date(v).toISOString().slice(0,10) : ''; }

  function openEdit(id) {
    const e = entries.find(x => x.candidateentryid === id);
    if (!e) return;
    editingId = id;
    document.getElementById('e-status').value   = e.statusid || '';
    document.getElementById('e-recruiter').value = e.recruiterid || '';
    document.getElementById('e-exp').value       = e.totalexperience || '';
    document.getElementById('e-ctc').value       = e.ctc || '';
    document.getElementById('e-ectc').value      = e.ectc || '';
    document.getElementById('e-np').value        = e.nodays || '';
    document.getElementById('e-cvlink').value    = e.cvlink || '';
    document.getElementById('e-cvdate').value    = toDL(e.cvdate);
    document.getElementById('e-score').value     = e.totalscore || '';
    document.getElementById('e-r1date').value    = toDTL(e.r1datetime);
    document.getElementById('e-r1fb').value      = e.r1feedback || '';
    document.getElementById('e-r2date').value    = toDTL(e.r2datetime);
    document.getElementById('e-r2fb').value      = e.r2feedback || '';
    document.getElementById('e-r3date').value    = toDTL(e.r3datetime);
    document.getElementById('e-r3fb').value      = e.r3feedback || '';
    document.getElementById('e-final').value     = toDTL(e.finalinterview);
    document.getElementById('e-finalfb').value   = e.finalfeedback || '';
    document.getElementById('e-notes').value     = e.recruiternotes || '';
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('edit-modal').classList.remove('open'); editingId = null; }

  async function saveEdit() {
    const body = {
      statusId: gi('e-status'), recruiterId: gi('e-recruiter'),
      totalExperience: gf('e-exp'), ctc: g('e-ctc'), ectc: g('e-ectc'), noDays: gi('e-np'),
      cvLink: g('e-cvlink'), cvDate: g('e-cvdate'), totalScore: gi('e-score'), recruiterNotes: g('e-notes'),
      r1Datetime: g('e-r1date'), r1Feedback: g('e-r1fb'), r2Datetime: g('e-r2date'), r2Feedback: g('e-r2fb'),
      r3Datetime: g('e-r3date'), r3Feedback: g('e-r3fb'), finalInterview: g('e-final'), finalFeedback: g('e-finalfb'),
    };
    try {
      const res = await fetch(`${API}/entries/${editingId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
      closeModal(); showToast('Entry updated!', 'success'); load();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    try {
      await fetch(`${API}/entries/${id}`, { method: 'DELETE' });
      showToast('Deleted', 'success'); load();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  load();
</script>
</body>
</html>
