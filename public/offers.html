<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offers — RecruitIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f9fc; --surface: #ffffff; --border: #e5e7ef; --border2: #d0d3e0;
    --accent: #4f6ef7; --green: #18a066; --red: #d94f4f; --gold: #d4920a;
    --text: #1a1d2e; --muted: #7b8099;
    --body: 'Poppins', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }
  nav { position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--body); font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }
  .nav-back { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border2); padding: 4px 10px; border-radius: 4px; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
  .nav-back:hover { color: var(--accent); border-color: var(--accent); }
  .wrapper { max-width: 1100px; margin: 0 auto; padding: 0 32px; }
  .page-header { padding: 20px 0 16px; }
  .page-label { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .page-title { font-size: 18px; font-weight: 600; }

  .tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; width: fit-content; background: var(--surface); }
  .tab { font-family: var(--mono); font-size: 11px; padding: 8px 20px; cursor: pointer; color: var(--muted); background: transparent; border: none; border-right: 1px solid var(--border); transition: all 0.2s; }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--green); color: #fff; }
  .tab:hover:not(.active) { background: #edfaf3; color: var(--green); }
  .panel { display: none; } .panel.active { display: block; }

  .add-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 18px 0 10px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-title:first-child { margin-top: 0; }
  .form-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 10px; }
  .form-grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--green); background: #fff; }
  .field select option { background: #fff; }
  .form-actions { display: flex; justify-content: flex-end; margin-top: 16px; gap: 8px; }

  .btn { font-family: var(--mono); font-size: 11px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border2); cursor: pointer; background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--green); color: #fff; border-color: var(--green); font-weight: 500; padding: 8px 18px; font-size: 12px; }
  .btn-primary:hover { filter: brightness(1.1); color: #fff; }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-sm { padding: 4px 9px; font-size: 10px; }

  .filters-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filters-bar input, .filters-bar select { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 7px 12px; outline: none; transition: border-color 0.2s; }
  .filters-bar input { flex: 1; min-width: 200px; }
  .filters-bar input:focus, .filters-bar select:focus { border-color: var(--green); }
  .filters-bar input::placeholder { color: var(--muted); }

  .table-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .table-head { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .table-head h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .count-badge { font-family: var(--mono); font-size: 10px; background: var(--bg); border: 1px solid var(--border2); color: var(--muted); padding: 2px 8px; border-radius: 10px; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 9px 14px; text-align: left; background: #fafbfd; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #edfaf3; }
  tbody td { padding: 10px 14px; font-size: 12px; vertical-align: middle; }
  .td-mono { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .bool-pill { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid; display: inline-block; }
  .bool-yes { color: var(--green); border-color: #b6e8d4; background: #edf9f4; }
  .bool-no { color: var(--muted); border-color: var(--border2); background: var(--bg); }
  .actions { display: flex; gap: 4px; }
  .empty-state { padding: 48px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 12px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 24px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 700px; margin: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; border-radius: 8px; padding: 10px 18px; font-family: var(--mono); font-size: 12px; z-index: 999; transform: translateY(60px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  footer { margin-top: 60px; border-top: 1px solid var(--border); padding: 16px 0; }
  .footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; }
  .footer-inner p { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  @media(max-width:768px) { .form-grid,.form-grid-2{grid-template-columns:1fr} .wrapper{padding:0 16px} }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>RecruitIQ</a>
    <a href="index.html" class="nav-back">← Home</a>
  </div>
</nav>
<div class="wrapper">
  <div class="page-header">
    <div class="page-label">Post-Offer Tracking</div>
    <h1 class="page-title">Offers</h1>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('view',this)">🤝 View All</button>
    <button class="tab" onclick="switchTab('add',this)">➕ Add Offer</button>
  </div>

  <!-- VIEW -->
  <div class="panel active" id="panel-view">
    <div class="filters-bar">
      <input type="text" id="search" placeholder="Search candidate, company, role..." oninput="filterOffers()" />
      <select id="filter-accepted" onchange="filterOffers()">
        <option value="">All</option>
        <option value="true">Accepted</option>
        <option value="false">Pending / Declined</option>
      </select>
    </div>
    <div class="table-panel">
      <div class="table-head">
        <h3>All Offers</h3>
        <span class="count-badge" id="count">0 offers</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Candidate</th><th>Role</th><th>Company</th>
            <th>Offer Date</th><th>Offered CTC</th><th>Notice Period</th>
            <th>Sent</th><th>Accepted</th><th>Accept Deadline</th><th>Joining Date</th>
            <th>Invoice ID</th><th>Actions</th>
          </tr></thead>
          <tbody id="table-body"><tr><td colspan="12"><div class="empty-state">Loading...</div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ADD -->
  <div class="panel" id="panel-add">
    <div class="add-panel">
      <div class="section-title">Candidate Entry</div>
      <div class="field" style="margin-bottom:10px">
        <label>Candidate Entry *</label>
        <select id="a-entry"><option value="">— Select Candidate Entry —</option></select>
      </div>
      <div class="section-title">Offer Details</div>
      <div class="form-grid">
        <div class="field"><label>Offered CTC</label><input type="text" id="a-ctc" placeholder="e.g. 20 LPA" /></div>
        <div class="field"><label>Offer Date</label><input type="datetime-local" id="a-date" /></div>
        <div class="field"><label>Acceptance Deadline</label><input type="date" id="a-deadline" /></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Joining Date</label><input type="date" id="a-joining" /></div>
        <div class="field"><label>Notice Period</label><input type="text" id="a-np" placeholder="e.g. 30 days" /></div>
        <div class="field"><label>Invoice ID</label><input type="number" id="a-invoice" placeholder="Invoice ID if exists" /></div>
      </div>
      <div class="form-grid-2">
        <div class="field"><label>Offer Sent?</label>
          <select id="a-sent"><option value="false">No</option><option value="true">Yes</option></select>
        </div>
        <div class="field"><label>Offer Accepted?</label>
          <select id="a-accepted"><option value="false">No</option><option value="true">Yes</option></select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="clearForm()">Clear</button>
        <button class="btn btn-primary" onclick="addOffer()">+ Add Offer</button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Offer</h3>
    <div class="form-grid">
      <div class="field"><label>Offered CTC</label><input type="text" id="e-ctc" /></div>
      <div class="field"><label>Offer Date</label><input type="datetime-local" id="e-date" /></div>
      <div class="field"><label>Acceptance Deadline</label><input type="date" id="e-deadline" /></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Joining Date</label><input type="date" id="e-joining" /></div>
      <div class="field"><label>Notice Period</label><input type="text" id="e-np" /></div>
      <div class="field"><label>Invoice ID</label><input type="number" id="e-invoice" /></div>
    </div>
    <div class="form-grid-2">
      <div class="field"><label>Offer Sent?</label>
        <select id="e-sent"><option value="false">No</option><option value="true">Yes</option></select>
      </div>
      <div class="field"><label>Offer Accepted?</label>
        <select id="e-accepted"><option value="false">No</option><option value="true">Yes</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<footer><div class="footer-inner"><p>RecruitIQ · 10xDeveloper.tech</p><p>offer table</p></div></footer>

<script>
  const API='/api';
  let offers=[],entries=[];let editingId=null;

  function switchTab(tab,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('panel-'+tab).classList.add('active');}

  async function load(){
    try{
      const [oRes,eRes]=await Promise.all([fetch(`${API}/offers`),fetch(`${API}/entries`)]);
      offers=await oRes.json();entries=await eRes.json();
      const opts=entries.map(e=>`<option value="${e.candidateentryid}">${e.candidatename||'?'} → ${e.rolename||'?'} @ ${e.companyname||'?'}</option>`).join('');
      document.getElementById('a-entry').innerHTML='<option value="">— Select Entry —</option>'+opts;
      render(offers);
    }catch(e){showToast('Failed to load','error');}
  }

  function boolPill(v){return v?'<span class="bool-pill bool-yes">Yes</span>':'<span class="bool-pill bool-no">No</span>';}
  function fmtDate(v){return v?new Date(v).toLocaleDateString():'—';}

  function render(data){
    const tbody=document.getElementById('table-body');
    document.getElementById('count').textContent=`${data.length} offer${data.length===1?'':'s'}`;
    if(!data.length){tbody.innerHTML=`<tr><td colspan="12"><div class="empty-state">No offers yet.</div></td></tr>`;return;}
    tbody.innerHTML=data.map(o=>`<tr>
      <td><strong>${o.candidatename||'—'}</strong></td>
      <td>${o.rolename||'—'}</td>
      <td>${o.companyname||'—'}</td>
      <td class="td-mono">${fmtDate(o.date)}</td>
      <td class="td-mono">${o.offeredctc||'—'}</td>
      <td class="td-mono">${o.noticeperiod||'—'}</td>
      <td>${boolPill(o.issent)}</td>
      <td>${boolPill(o.hasaccepted)}</td>
      <td class="td-mono">${fmtDate(o.acceptancedeadline)}</td>
      <td class="td-mono">${fmtDate(o.joiningdate)}</td>
      <td class="td-mono">${o.invoiceid||'—'}</td>
      <td><div class="actions">
        <button class="btn btn-sm" onclick="openEdit(${o.offerid})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteOffer(${o.offerid})">Del</button>
      </div></td></tr>`).join('');
  }

  function filterOffers(){
    const q=document.getElementById('search').value.toLowerCase();
    const fa=document.getElementById('filter-accepted').value;
    render(offers.filter(o=>
      (!q||(o.candidatename||'').toLowerCase().includes(q)||(o.rolename||'').toLowerCase().includes(q)||(o.companyname||'').toLowerCase().includes(q))&&
      (fa===''||String(o.hasaccepted)===fa)
    ));
  }

  function g(id){return document.getElementById(id).value.trim()||null;}
  function gi(id){const v=document.getElementById(id).value;return v?parseInt(v):null;}
  function gb(id){return document.getElementById(id).value==='true';}

  async function addOffer(){
    const entryId=gi('a-entry');if(!entryId)return showToast('Please select a candidate entry','error');
    const body={candidateEntryId:entryId,offeredCtc:g('a-ctc'),date:g('a-date'),acceptanceDeadline:g('a-deadline'),joiningDate:g('a-joining'),noticePeriod:g('a-np'),invoiceId:gi('a-invoice'),isSent:gb('a-sent'),hasAccepted:gb('a-accepted')};
    try{
      const res=await fetch(`${API}/offers`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!res.ok){const err=await res.json();throw new Error(err.error);}
      showToast('Offer added!','success');clearForm();document.querySelectorAll('.tab')[0].click();load();
    }catch(e){showToast(e.message,'error');}
  }

  function clearForm(){['a-entry','a-ctc','a-date','a-deadline','a-joining','a-np','a-invoice'].forEach(id=>document.getElementById(id).value='');document.getElementById('a-sent').value='false';document.getElementById('a-accepted').value='false';}

  function toDTL(v){return v?new Date(v).toISOString().slice(0,16):'';}
  function toDL(v){return v?new Date(v).toISOString().slice(0,10):'';}

  function openEdit(id){
    const o=offers.find(x=>x.offerid===id);if(!o)return;editingId=id;
    document.getElementById('e-ctc').value=o.offeredctc||'';document.getElementById('e-date').value=toDTL(o.date);document.getElementById('e-deadline').value=toDL(o.acceptancedeadline);document.getElementById('e-joining').value=toDL(o.joiningdate);document.getElementById('e-np').value=o.noticeperiod||'';document.getElementById('e-invoice').value=o.invoiceid||'';document.getElementById('e-sent').value=String(o.issent||false);document.getElementById('e-accepted').value=String(o.hasaccepted||false);
    document.getElementById('edit-modal').classList.add('open');
  }
  function closeModal(){document.getElementById('edit-modal').classList.remove('open');editingId=null;}

  async function saveEdit(){
    const body={offeredCtc:g('e-ctc'),date:g('e-date'),acceptanceDeadline:g('e-deadline'),joiningDate:g('e-joining'),noticePeriod:g('e-np'),invoiceId:gi('e-invoice'),isSent:gb('e-sent'),hasAccepted:gb('e-accepted')};
    try{
      const res=await fetch(`${API}/offers/${editingId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!res.ok){const err=await res.json();throw new Error(err.error);}
      closeModal();showToast('Offer updated!','success');load();
    }catch(e){showToast(e.message,'error');}
  }

  async function deleteOffer(id){if(!confirm('Delete this offer?'))return;try{await fetch(`${API}/offers/${id}`,{method:'DELETE'});showToast('Deleted','success');load();}catch(e){showToast(e.message,'error');}}

  function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
  load();
</script>
</body>
</html>
