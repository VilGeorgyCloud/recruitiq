<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — RecruitIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f9fc; --surface: #ffffff; --border: #e5e7ef; --border2: #d0d3e0;
    --accent: #4f6ef7; --red: #d94f4f; --text: #1a1d2e; --muted: #7b8099;
    --body: 'Poppins', sans-serif; --mono: 'DM Mono', monospace;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--body);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 40px 36px; width: 100%; max-width: 380px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
  .logo-dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; }
  .logo-text { font-size: 18px; font-weight: 700; }
  h1 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 11px 16px; border-radius: 8px;
    border: 1px solid var(--border2); background: #fff; color: var(--text);
    font-family: var(--body); font-size: 14px; font-weight: 500;
    cursor: pointer; text-decoration: none; transition: all 0.2s;
  }
  .google-btn:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(79,110,247,0.15); }

  .error-box {
    margin-top: 20px; padding: 12px 16px; border-radius: 8px;
    background: #fff0f0; border: 1px solid #f5b8b8; color: var(--red);
    font-size: 12.5px; font-family: var(--mono); text-align: left;
    display: none;
  }
  .error-box.show { display: block; }

  footer { margin-top: 28px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="logo-dot"></span><span class="logo-text">RecruitIQ</span></div>
    <h1>Sign in to continue</h1>
    <p class="sub">Access is restricted to authorized accounts only.</p>

    <a href="/auth/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92A8.78 8.78 0 0 0 17.64 9.2z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.55-1.84.88-3.04.88-2.34 0-4.32-1.58-5.03-3.7H.92v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.74A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.2.29-1.74V4.93H.92A9 9 0 0 0 0 9c0 1.45.35 2.83.92 4.07l3.05-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.59 8.59 0 0 0 9 0a9 9 0 0 0-8.08 4.93l3.05 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      Sign in with Google
    </a>

    <div class="error-box" id="error-box"></div>

    <footer>RecruitIQ · 10xDeveloper.tech</footer>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  const email = params.get('email');
  const box = document.getElementById('error-box');

  if (error === 'no_access') {
    box.textContent = `Access denied${email ? ` for ${email}` : ''}. This account is not registered. Contact your administrator.`;
    box.classList.add('show');
  } else if (error === 'auth_failed') {
    box.textContent = 'Authentication failed. Please try again.';
    box.classList.add('show');
  } else if (error === 'no_code') {
    box.textContent = 'Login was cancelled or incomplete.';
    box.classList.add('show');
  }
</script>
</body>
</html>
