<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiring Companies — RecruitIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0c0f; --surface: #13151a; --border: #1e2028; --border2: #2a2d38;
    --accent: #4f6ef7; --accent2: #c8b8ff; --gold: #f0c060; --green: #3ecf8e;
    --red: #f26a6a; --text: #e8eaf0; --muted: #6b7080;
    --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif; --body: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: 0.4; pointer-events: none; z-index: 0;
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.15; }
  .orb-1 { width: 500px; height: 500px; background: var(--gold); top: -200px; right: -100px; }
  .orb-2 { width: 300px; height: 300px; background: var(--accent); bottom: -100px; left: -100px; }

  nav { position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); background: rgba(11,12,15,0.85); backdrop-filter: blur(12px); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--display); font-size: 18px; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-back { font-family: var(--mono); font-size: 11px; color: var(--muted); border: 1px solid var(--border2); padding: 4px 12px; border-radius: 4px; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
  .nav-back:hover { color: var(--text); border-color: var(--accent); }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 32px; }

  .page-header { padding: 48px 0 36px; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .page-label { font-family: var(--mono); font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .page-label::before { content: ''; display: block; width: 20px; height: 1px; background: var(--gold); }
  .page-title { font-family: var(--display); font-size: 36px; font-weight: 800; letter-spacing: -1px; }
  .page-sub { font-size: 14px; color: var(--muted); margin-top: 6px; font-weight: 300; }

  /* ADD FORM */
  .add-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 32px; animation: fadeUp 0.6s 0.1s ease both; }
  .panel-title { font-family: var(--display); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .form-row { display: flex; gap: 12px; align-items: flex-end; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .field label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select {
    background: var(--bg); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: var(--body); font-size: 14px;
    padding: 10px 14px; outline: none; transition: border-color 0.2s;
    width: 100%;
  }
  .field input:focus, .field select:focus { border-color: var(--gold); }
  .field select option { background: var(--surface); }
  .btn { font-family: var(--mono); font-size: 12px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; white-space: nowrap; }
  .btn-primary { background: var(--gold); color: #000; font-weight: 500; }
  .btn-primary:hover { background: #f5d080; transform: translateY(-1px); }
  .btn-danger { background: transparent; border: 1px solid var(--border2); color: var(--red); }
  .btn-danger:hover { border-color: var(--red); background: color-mix(in srgb, var(--red) 8%, transparent); }
  .btn-edit { background: transparent; border: 1px solid var(--border2); color: var(--muted); }
  .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

  /* TABLE */
  .table-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: fadeUp 0.6s 0.2s ease both; }
  .table-head { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .table-head h3 { font-family: var(--display); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .count-badge { font-family: var(--mono); font-size: 11px; background: var(--bg); border: 1px solid var(--border2); color: var(--muted); padding: 3px 10px; border-radius: 20px; }

  .search-bar { padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .search-bar input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 14px; outline: none; transition: border-color 0.2s; }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar input::placeholder { color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  thead th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 12px 24px; text-align: left; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: color-mix(in srgb, var(--gold) 3%, transparent); }
  tbody td { padding: 14px 24px; font-size: 14px; }

  .status-pill { font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 20px; border: 1px solid; display: inline-block; }
  .pill-active { color: var(--green); border-color: color-mix(in srgb, var(--green) 30%, transparent); background: color-mix(in srgb, var(--green) 8%, transparent); }
  .pill-inactive { color: var(--muted); border-color: var(--border2); background: transparent; }

  .actions { display: flex; gap: 6px; }
  .empty-state { padding: 64px 24px; text-align: center; }
  .empty-state p { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 20px; font-family: var(--mono); font-size: 12px; color: var(--text); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 28px; width: 100%; max-width: 440px; animation: fadeUp 0.25s ease; }
  .modal h3 { font-family: var(--display); font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }

  footer { margin-top: 80px; border-top: 1px solid var(--border); padding: 24px 0; }
  .footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; }
  .footer-inner p { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  @media(max-width:768px) { .form-row { flex-direction: column; } .wrapper { padding: 0 16px; } }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>RecruitIQ</a>
    <div class="nav-right">
      <a href="index.html" class="nav-back">← Home</a>
    </div>
  </div>
</nav>

<div class="wrapper">
  <div class="page-header">
    <div class="page-label">Management</div>
    <h1 class="page-title">Hiring Companies</h1>
    <p class="page-sub">Manage client companies and their hiring mandates.</p>
  </div>

  <!-- ADD FORM -->
  <div class="add-panel">
    <div class="panel-title">Add Company</div>
    <div class="form-row">
      <div class="field">
        <label>Company Name *</label>
        <input type="text" id="input-name" placeholder="e.g. Acme Corp" />
      </div>
      <button class="btn btn-primary" onclick="addCompany()">+ Add</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-panel">
    <div class="table-head">
      <h3>All Companies</h3>
      <span class="count-badge" id="count">0 companies</span>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search companies..." oninput="filterTable()" />
    </div>
    <table>
      <thead>
        <tr>
          <th>Company Name</th>
          <th>Status</th>
          <th>Added</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="4"><div class="empty-state"><p>Loading...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Company</h3>
    <div class="field" style="margin-bottom:16px">
      <label>Company Name</label>
      <input type="text" id="edit-name" />
    </div>
    <div class="field">
      <label>Status</label>
      <select id="edit-active">
        <option value="true">Active</option>
        <option value="false">Inactive</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-edit" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <div class="footer-inner">
    <p>RecruitIQ · 10xDeveloper.tech</p>
    <p>hiringCompany table</p>
  </div>
</footer>

<script>
  const API = '/api';
  let companies = [];
  let editingId = null;

  async function load() {
    try {
      const res = await fetch(`${API}/companies`);
      companies = await res.json();
      render(companies);
    } catch(e) { showToast('Failed to load companies', 'error'); }
  }

  function render(data) {
    const tbody = document.getElementById('table-body');
    document.getElementById('count').textContent = `${data.length} compan${data.length===1?'y':'ies'}`;
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><p>No companies yet — add one above.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(c => `
      <tr>
        <td><strong>${c.name}</strong></td>
        <td><span class="status-pill ${c.isActive ? 'pill-active' : 'pill-inactive'}">${c.isActive ? 'Active' : 'Inactive'}</span></td>
        <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${new Date(c.createdAt).toLocaleDateString()}</td>
        <td><div class="actions">
          <button class="btn btn-edit" onclick="openEdit(${c.hiringCompanyId}, '${c.name}', ${c.isActive})">Edit</button>
          <button class="btn btn-danger" onclick="deleteCompany(${c.hiringCompanyId})">Delete</button>
        </div></td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    render(companies.filter(c => c.name.toLowerCase().includes(q)));
  }

  async function addCompany() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) return showToast('Company name is required', 'error');
    try {
      const res = await fetch(`${API}/companies`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
      document.getElementById('input-name').value = '';
      showToast('Company added!', 'success');
      load();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openEdit(id, name, isActive) {
    editingId = id;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-active').value = String(isActive);
    document.getElementById('edit-modal').classList.add('open');
  }
  function closeModal() { document.getElementById('edit-modal').classList.remove('open'); editingId = null; }

  async function saveEdit() {
    const name = document.getElementById('edit-name').value.trim();
    const isActive = document.getElementById('edit-active').value === 'true';
    try {
      await fetch(`${API}/companies/${editingId}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, isActive })
      });
      closeModal();
      showToast('Company updated!', 'success');
      load();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function deleteCompany(id) {
    if (!confirm('Delete this company? This cannot be undone.')) return;
    try {
      await fetch(`${API}/companies/${id}`, { method: 'DELETE' });
      showToast('Company deleted', 'success');
      load();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  load();
</script>
</body>
</html>
