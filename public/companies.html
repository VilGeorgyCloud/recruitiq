<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiring Companies — RecruitIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f9fc; --surface: #ffffff; --border: #e5e7ef; --border2: #d0d3e0;
    --accent: #4f6ef7; --green: #18a066; --red: #d94f4f; --gold: #d4920a;
    --text: #1a1d2e; --muted: #7b8099;
    --body: 'Poppins', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }

  nav { position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--body); font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }
  .nav-back { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border2); padding: 4px 10px; border-radius: 4px; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
  .nav-back:hover { color: var(--accent); border-color: var(--accent); }

  .wrapper { max-width: 1100px; margin: 0 auto; padding: 0 32px; }
  .page-header { padding: 20px 0 16px; }
  .page-label { font-family: var(--mono); font-size: 10px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .page-title { font-size: 18px; font-weight: 600; }

  .add-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .form-row { display: flex; gap: 10px; align-items: flex-end; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .field label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }

  .btn { font-family: var(--mono); font-size: 11px; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border2); cursor: pointer; transition: all 0.15s; background: var(--surface); color: var(--muted); white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 500; }
  .btn-primary:hover { filter: brightness(1.1); color: #fff; border-color: var(--gold); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-sm { padding: 5px 10px; font-size: 10px; }

  .table-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .table-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .table-head h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .count-badge { font-family: var(--mono); font-size: 10px; background: var(--bg); border: 1px solid var(--border2); color: var(--muted); padding: 2px 8px; border-radius: 10px; }
  .search-bar { padding: 12px 20px; border-bottom: 1px solid var(--border); }
  .search-bar input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 7px 12px; outline: none; transition: border-color 0.2s; }
  .search-bar input:focus { border-color: var(--accent); background: #fff; }
  .search-bar input::placeholder { color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  thead th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 10px 16px; text-align: left; background: #fafbfd; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fdf9ee; }
  tbody td { padding: 12px 16px; font-size: 13px; }
  .td-mono { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .actions { display: flex; gap: 4px; }
  .empty-state { padding: 48px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 12px; }
  .status-pill { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid; display: inline-block; }
  .pill-active { color: var(--green); border-color: #b6e8d4; background: #edf9f4; }
  .pill-inactive { color: var(--muted); border-color: var(--border2); background: var(--bg); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; border-radius: 8px; padding: 10px 18px; font-family: var(--mono); font-size: 12px; z-index: 999; transform: translateY(60px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  footer { margin-top: 60px; border-top: 1px solid var(--border); padding: 16px 0; }
  .footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; }
  .footer-inner p { font-family: var(--mono); font-size: 10px; color: var(--muted); }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>RecruitIQ</a>
    <a href="index.html" class="nav-back">← Home</a>
  </div>
</nav>
<div class="wrapper">
  <div class="page-header">
    <div class="page-label">Management</div>
    <h1 class="page-title">Hiring Companies</h1>
  </div>
  <div class="add-panel">
    <div class="panel-title">Add Company</div>
    <div class="form-row">
      <div class="field"><label>Company Name *</label><input type="text" id="input-name" placeholder="e.g. Acme Corp" /></div>
      <button class="btn btn-primary" onclick="addCompany()">+ Add</button>
    </div>
  </div>
  <div class="table-panel">
    <div class="table-head">
      <h3>All Companies</h3>
      <span class="count-badge" id="count">0 companies</span>
    </div>
    <div class="search-bar"><input type="text" id="search" placeholder="Search companies..." oninput="filterTable()" /></div>
    <table>
      <thead><tr><th>Company Name</th><th>Status</th><th>Added</th><th>Actions</th></tr></thead>
      <tbody id="table-body"><tr><td colspan="4"><div class="empty-state">Loading...</div></td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Company</h3>
    <div class="field" style="margin-bottom:14px"><label>Company Name</label><input type="text" id="edit-name" /></div>
    <div class="field"><label>Status</label><select id="edit-active"><option value="true">Active</option><option value="false">Inactive</option></select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<footer><div class="footer-inner"><p>RecruitIQ · 10xDeveloper.tech</p><p>hiringCompany table</p></div></footer>

<script>
  const API='/api'; let companies=[]; let editingId=null;
  async function load() {
    try { const res=await fetch(`${API}/companies`); companies=await res.json(); render(companies); }
    catch(e) { showToast('Failed to load','error'); }
  }
  function render(data) {
    const tbody=document.getElementById('table-body');
    document.getElementById('count').textContent=`${data.length} compan${data.length===1?'y':'ies'}`;
    if(!data.length){tbody.innerHTML=`<tr><td colspan="4"><div class="empty-state">No companies yet.</div></td></tr>`;return;}
    tbody.innerHTML=data.map(c=>`<tr>
      <td><strong>${c.name}</strong></td>
      <td><span class="status-pill ${c.isactive?'pill-active':'pill-inactive'}">${c.isactive?'Active':'Inactive'}</span></td>
      <td class="td-mono">${new Date(c.createdat).toLocaleDateString()}</td>
      <td><div class="actions">
        <button class="btn btn-sm" onclick="openEdit(${c.hiringcompanyid},'${c.name}',${c.isactive})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteCompany(${c.hiringcompanyid})">Del</button>
      </div></td></tr>`).join('');
  }
  function filterTable(){const q=document.getElementById('search').value.toLowerCase();render(companies.filter(c=>c.name.toLowerCase().includes(q)));}
  async function addCompany(){
    const name=document.getElementById('input-name').value.trim();
    if(!name)return showToast('Name required','error');
    try{const res=await fetch(`${API}/companies`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
    if(!res.ok){const e=await res.json();throw new Error(e.error);}
    document.getElementById('input-name').value='';showToast('Company added!','success');load();}
    catch(e){showToast(e.message,'error');}
  }
  function openEdit(id,name,isActive){editingId=id;document.getElementById('edit-name').value=name;document.getElementById('edit-active').value=String(isActive);document.getElementById('edit-modal').classList.add('open');}
  function closeModal(){document.getElementById('edit-modal').classList.remove('open');editingId=null;}
  async function saveEdit(){
    const name=document.getElementById('edit-name').value.trim();const isActive=document.getElementById('edit-active').value==='true';
    try{await fetch(`${API}/companies/${editingId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,isActive})});
    closeModal();showToast('Updated!','success');load();}catch(e){showToast(e.message,'error');}
  }
  async function deleteCompany(id){
    if(!confirm('Delete this company?'))return;
    try{await fetch(`${API}/companies/${id}`,{method:'DELETE'});showToast('Deleted','success');load();}catch(e){showToast(e.message,'error');}
  }
  function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
  load();
</script>
</body>
</html>
